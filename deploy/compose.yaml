name: threatnoir-platform

include:
  - compose.supabase.yaml

services:
  ai-gateway:
    build:
      context: ./ai-gateway
    image: threatnoir-platform-ai-gateway
    restart: unless-stopped
    depends_on:
      supabase-kong:
        condition: service_healthy

    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-haiku}
      AI_CLI_BIN: ${AI_CLI_BIN:-claude}
      AI_CLI_ARGS: ${AI_CLI_ARGS:---print}
      AI_CLI_TIMEOUT_MS: ${AI_CLI_TIMEOUT_MS:-60000}
      # Used for OpenRouter attribution headers (http-referer).
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:${APP_PORT:-7000}}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}


      AI_PROVIDER: ${AI_PROVIDER:-claude}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}

      AI_GATEWAY_INTERNAL_TOKEN: ${AI_GATEWAY_INTERNAL_TOKEN}
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_DAILY_LIMIT: ${AI_DAILY_LIMIT:-500}
      AI_MONTHLY_BUDGET_CENTS: ${AI_MONTHLY_BUDGET_CENTS:-500}
    healthcheck:
      # Avoid IPv6 ::1 resolution issues in minimal images
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: expose ai-gateway to the host ONLY when --profile dev.
  # Default flow keeps ai-gateway internal-only.
  ai-gateway-dev:
    profiles: ["dev"]
    image: alpine:3.21
    restart: unless-stopped
    depends_on:
      ai-gateway:
        condition: service_healthy
    command: >-
      sh -c "apk add --no-cache socat >/dev/null && exec socat TCP-LISTEN:8080,fork,reuseaddr TCP-CONNECT:ai-gateway:8080"
    ports:
      - "${AI_GATEWAY_PORT:-7180}:8080"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[s]ocat'"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: deploy/app/Dockerfile
      args:
        SUPABASE_URL: http://supabase-kong:8000
        SUPABASE_KEY: ${SUPABASE_KEY}
        SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
        # For Phase 1 we map secret key to the service role JWT.
        SUPABASE_SECRET_KEY: ${SUPABASE_SERVICE_KEY}
    image: threatnoir-platform-app
    restart: unless-stopped
    depends_on:
      supabase-kong:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-7000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      # App-required env vars (see repo root .env.example)
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_KEY: ${SUPABASE_KEY}
      # Preferred server key (service role JWT). Newer codepaths look for this.
      # For Phase 1 we map it to the service role JWT.
      SUPABASE_SECRET_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}

      # Nuxt runtimeConfig (private) — required for @nuxtjs/supabase server helpers
      # like serverSupabaseServiceRole(), which reads from useRuntimeConfig().supabase.*
      NUXT_SUPABASE_SECRET_KEY: ${SUPABASE_SERVICE_KEY}
      NUXT_SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

      # Used by the app container entrypoint to proxy localhost:${SUPABASE_KONG_PORT}
      # back to supabase-kong:8000 (so the same public URL works in SSR + browser).
      SUPABASE_KONG_PORT: ${SUPABASE_KONG_PORT:-7100}

      CRON_SECRET: ${CRON_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-}

      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      X_CONSUMER_KEY: ${X_CONSUMER_KEY:-}
      X_CONSUMER_SECRET: ${X_CONSUMER_SECRET:-}
      X_ACCESS_TOKEN: ${X_ACCESS_TOKEN:-}
      X_ACCESS_TOKEN_SECRET: ${X_ACCESS_TOKEN_SECRET:-}

      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # With compose AI gateway, default AI to ON (set AI_ENABLED=false to kill-switch).
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_DAILY_LIMIT: ${AI_DAILY_LIMIT:-500}
      AI_MONTHLY_BUDGET_CENTS: ${AI_MONTHLY_BUDGET_CENTS:-500}
      AI_AUTO_APPROVE_THRESHOLD: ${AI_AUTO_APPROVE_THRESHOLD:-8}
      AI_AUTO_REJECT_THRESHOLD: ${AI_AUTO_REJECT_THRESHOLD:-3}

      # AI gateway (internal-only service)
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-http://ai-gateway:8080}
      AI_GATEWAY_INTERNAL_TOKEN: ${AI_GATEWAY_INTERNAL_TOKEN}

      PLATFORM_API_KEYS: ${PLATFORM_API_KEYS:-your-key-here:admin}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:${APP_PORT:-7000}}

      # Extra: client-side Supabase settings (Nuxt runtimeConfig public)
      NUXT_PUBLIC_SUPABASE_URL: ${NUXT_PUBLIC_SUPABASE_URL:-http://localhost:${SUPABASE_KONG_PORT:-7100}}
      NUXT_PUBLIC_SUPABASE_KEY: ${NUXT_PUBLIC_SUPABASE_KEY:-${SUPABASE_KEY}}

      MAX_ARTICLE_AGE_HOURS: ${MAX_ARTICLE_AGE_HOURS:-48}

  cron:
    build:
      context: ..
      dockerfile: deploy/cron/Dockerfile
    image: threatnoir-platform-cron
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[s]upercronic'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      CRON_SECRET: ${CRON_SECRET}

      # Provided for parity with app container (future cron direct gateway calls)
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-http://ai-gateway:8080}
      AI_GATEWAY_INTERNAL_TOKEN: ${AI_GATEWAY_INTERNAL_TOKEN}

  bootstrap:
    build:
      context: ./bootstrap
    image: threatnoir-platform-bootstrap
    restart: "no"
    depends_on:
      app:
        condition: service_started
      supabase-kong:
        condition: service_healthy
    environment:
      POSTGRES_HOST: supabase-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: supabase_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      APP_URL: ${APP_URL:-http://app:3000}
      KONG_URL: ${KONG_URL:-http://supabase-kong:8000}

      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      CRON_SECRET: ${CRON_SECRET}

      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      BACKFILL_HOURS: ${BACKFILL_HOURS:-8}
      BOOTSTRAP_INGEST: ${BOOTSTRAP_INGEST:-true}
      BOOTSTRAP_RUN_AI: ${BOOTSTRAP_RUN_AI:-false}

      # Used only to determine whether AI can run without failing.
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-http://ai-gateway:8080}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
