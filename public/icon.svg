<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
	<defs>
		<filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
			<feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur" />
			<feMerge>
				<feMergeNode in="blur" />
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>

		<path
			id="shieldPath"
			d="M50 12 C66 12 80 20 80 34 V58 C80 74 66 86 50 92 C34 86 20 74 20 58 V34 C20 20 34 12 50 12 Z" />

		<clipPath id="shieldClip">
			<use href="#shieldPath" />
		</clipPath>
	</defs>

	<!-- Shield outline + subtle glow -->
	<use href="#shieldPath" stroke="#4CD7F6" stroke-width="3" opacity="0.35" filter="url(#glow)" />
	<use href="#shieldPath" stroke="#4CD7F6" stroke-width="2" stroke-linejoin="round" />

	<!-- Pulse/ECG line (clipped inside shield) -->
	<g clip-path="url(#shieldClip)">
		<path
			d="M26 50 H36 L40 56 L46 36 L52 64 L58 48 L62 52 H74"
			stroke="#4CD7F6"
			stroke-width="2.2"
			stroke-linecap="round"
			stroke-linejoin="round"
			opacity="0.45"
			filter="url(#glow)" />
		<path
			d="M26 50 H36 L40 56 L46 36 L52 64 L58 48 L62 52 H74"
			stroke="#4CD7F6"
			stroke-width="2"
			stroke-linecap="round"
			stroke-linejoin="round" />
	</g>
</svg>
